name: Deploy LAIKA Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy backend
    runs-on: [self-hosted, perro-server]

    steps:
      - name: Deploy LAIKA backend on server
        run: |
          set -e

          echo "===== DEPLOY LAIKA BACKEND ====="
          echo "User: $(whoami)"
          echo "Date: $(date)"

          APP_DIR="/home/perrobot/LAIKA-BACKEND"
          APP_NAME="laika-api"
          BRANCH="main"

          echo "===== GO TO APP DIR ====="
          cd "$APP_DIR"
          pwd

          echo "===== LOAD NODE ENVIRONMENT ====="
          export NVM_DIR="/home/perrobot/.nvm"
          if [ -s "$NVM_DIR/nvm.sh" ]; then
            . "$NVM_DIR/nvm.sh"
            nvm use --lts
          fi

          echo "Node version:"
          node -v

          echo "NPM version:"
          npm -v

          echo "NPX version:"
          npx -v

          echo "===== GIT UPDATE ====="
          git fetch origin "$BRANCH"
          git reset --hard "origin/$BRANCH"

          echo "Latest commit:"
          git log -1 --oneline

          echo "===== CREATE .ENV ====="
          cat > .env << EOF
          DATABASE_URL="${{ secrets.DATABASE_URL }}"
          NODE_ENV="production"
          PORT="${{ secrets.PORT }}"
          EOF

          echo "===== INSTALL DEPENDENCIES ====="
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

          echo "===== PRISMA GENERATE ====="
          npx prisma generate || echo "Prisma generate skipped or failed"

          echo "===== PRISMA MIGRATE DEPLOY ====="
          npx prisma migrate deploy || echo "Prisma migrate deploy skipped or failed"

          echo "===== PM2 CHECK ====="
          if ! command -v pm2 > /dev/null; then
            echo "PM2 not found. Installing..."
            npm install -g pm2
          fi

          pm2 -v

          echo "===== RESTART PM2 APP ====="
          echo "Restarting PM2 app: $APP_NAME"

          if pm2 describe "$APP_NAME" > /dev/null; then
            pm2 restart "$APP_NAME" --update-env
          else
            pm2 start npm --name "$APP_NAME" -- start
          fi

          echo "===== SAVE PM2 ====="
          pm2 save

          echo "===== PM2 STATUS ====="
          pm2 list

          echo "===== PM2 LOGS ====="
          pm2 logs "$APP_NAME" --lines 40 --nostream

          echo "===== DEPLOY FINISHED ====="
